<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Simon Says Pi{% endblock %}</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link
        href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto:wght@300;400;700&display=swap"
        rel="stylesheet">
    <script src="https://cdn.socket.io/4.6.0/socket.io.min.js"></script>

    <style>
        :root {
            --bg-dark: #0a1128;
            --purple-deep: #0d001a;
            --purple-gradient: linear-gradient(to bottom, #0d001a 0%, #2b0054 50%, #4a0080 100%);
            --card-bg: rgba(25, 0, 50, 0.6);
            --accent-color: #ff00ff; /* Neon Purple */
            --text-main: #e0e0e0;
            --neon-pink: #ff007f;
            --neon-blue: #00d2ff;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            min-height: 100vh;
            background-color: var(--purple-deep) !important;
            background-image: var(--purple-gradient) !important;
            background-attachment: fixed;
            color: var(--text-main);
            font-family: 'Roboto', sans-serif;
            overflow-x: hidden;
        }

        /* 
         * GLOBAL RETROWAVE DECORATIONS 
         */
        #bg-container {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        .cyber-grid {
            position: absolute;
            bottom: 0; left: 0;
            width: 100%; height: 85%;
            background-image: 
                linear-gradient(rgba(255, 0, 255, 0.25) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 0, 255, 0.25) 1px, transparent 1px);
            background-size: 50px 50px;
            background-position: center bottom;
            transform: perspective(300px) rotateX(60deg);
            animation: grid-move 5s linear infinite;
            mask-image: linear-gradient(to top, rgba(0,0,0,1) 0%, rgba(0,0,0,0) 90%);
            -webkit-mask-image: linear-gradient(to top, rgba(0,0,0,1) 0%, rgba(0,0,0,0) 90%);
        }

        .cyber-sun {
            position: absolute;
            bottom: 35%; left: 50%;
            transform: translateX(-50%);
            width: min(75vw, 380px);
            height: min(75vw, 380px);
            background: linear-gradient(to bottom, var(--neon-pink) 0%, #ff8c00 100%);
            border-radius: 50%;
            box-shadow: 0 0 50px var(--neon-pink);
            opacity: 0.5;
            mask-image: repeating-linear-gradient(transparent, transparent 10px, black 12px, black 22px);
            -webkit-mask-image: repeating-linear-gradient(transparent, transparent 10px, black 12px, black 22px);
            animation: sun-pulse 4s ease-in-out infinite alternate;
        }

        @keyframes grid-move {
            from { background-position: center 0; }
            to { background-position: center 50px; }
        }

        @keyframes sun-pulse {
            from { transform: translateX(-50%) scale(1); }
            to { transform: translateX(-50%) scale(1.04); }
        }

        /* DATA STREAMS */
        .shooting-light {
            position: fixed;
            bottom: -200px;
            width: 3px; height: 130px;
            background: linear-gradient(to top, transparent, #fff, var(--accent-color));
            box-shadow: 0 0 20px var(--accent-color);
            opacity: 0;
            animation: shoot-up 5s infinite ease-in;
            z-index: 1;
        }

        @keyframes shoot-up {
            0% { transform: translateY(0); opacity: 0; }
            15% { opacity: 0.7; }
            85% { opacity: 0.7; }
            100% { transform: translateY(-130vh); opacity: 0; }
        }

        /* 
         * CRT SCANLINE OVERLAY 
         */
        #crt-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.15) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            background-size: 100% 4px, 3px 100%;
            z-index: 9999;
            pointer-events: none;
            opacity: 0.5;
        }

        /* NEON SCREEN BORDER */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            border: 2px solid var(--accent-color);
            box-shadow: inset 0 0 20px var(--accent-color);
            z-index: 10000;
            pointer-events: none;
            opacity: 0.15;
            animation: border-pulse 4s infinite alternate;
        }

        @keyframes border-pulse {
            from { opacity: 0.1; }
            to { opacity: 0.25; }
        }

        h1, h2, h3, .navbar-brand {
            font-family: 'Orbitron', sans-serif;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 10px var(--accent-color);
        }

        .navbar {
            background-color: rgba(10, 0, 26, 0.8) !important;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 2px solid var(--accent-color);
            z-index: 1000;
        }

        .nav-link { color: #fff !important; transition: 0.3s; }
        .nav-link.active, .nav-link:hover {
            color: var(--accent-color) !important;
            text-shadow: 0 0 10px var(--accent-color);
        }

        main {
            position: relative;
            z-index: 100;
        }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 0, 255, 0.2);
            border-radius: 20px;
            color: white;
            overflow: hidden;
        }

        /* FOOTER STYLING */
        footer {
            margin-top: 60px; /* Bit higher than before */
            padding: 30px 0;
            text-align: center;
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.4);
            background: transparent; /* Remove black bar */
            border-top: none; /* Cleaner look */
        }

        footer p {
            max-width: 900px;
            margin: 0 auto;
            line-height: 1.8;
            text-align: center;
        }
    </style>

    {% block extra_css %}{% endblock %}
</head>

<body class="d-flex flex-column">

    <!-- Global Cyberpunk Background -->
    <div id="crt-overlay"></div>
    <div id="bg-container">
        <div class="cyber-grid"></div>
        <div class="cyber-sun"></div>
    </div>
    
    <!-- Shooting Lights (Data Streams) -->
    <div class="shooting-light" style="left: 15%; animation-delay: 0s;"></div>
    <div class="shooting-light" style="left: 45%; animation-delay: 1.2s;"></div>
    <div class="shooting-light" style="left: 75%; animation-delay: 0.5s;"></div>
    <div class="shooting-light" style="left: 25%; animation-delay: 3.3s;"></div>

    <nav class="navbar navbar-expand-lg navbar-dark sticky-top mb-4">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center" href="/">
                <span class="me-2">🧠</span> SIMON SAYS PI
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <div class="navbar-nav ms-auto">
                    <a class="nav-link {% if request.path == '/' %}active{% endif %}" href="/">Dashboard</a>
                    <a class="nav-link {% if request.path == '/remote' %}active{% endif %}" href="/remote">Remote
                        Control</a>
                    <a class="nav-link {% if request.path == '/admin/debug' %}active{% endif %}" href="/admin/debug">Admin Debug</a>
                </div>
            </div>
        </div>
    </nav>

    <main class="container py-4">
        {% block content %}{% endblock %}
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2026 Raspberry Pi Simon Says Project BBS Mainz 1 BSFI24D | Running on Python & Flask | Made by
                Lars, Sebastian, Robin,
                Timo and Nico</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    {% block extra_js %}{% endblock %}
</body>

</html>
